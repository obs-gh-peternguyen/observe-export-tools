<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observe All Monitors Export</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  .header span { font-size: 12px; color: #8b949e; background: #30363d; padding: 2px 8px; border-radius: 12px; }
  .form-bar { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: monospace; outline: none; }
  .form-group input:focus { border-color: #58a6ff; }
  .form-group input::placeholder { color: #484f58; }
  #customerId { width: 140px; }
  #domain { width: 120px; }
  #token { width: 280px; }
  .btn { padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
  .btn-primary { background: #238636; color: #fff; border-color: #2ea043; }
  .btn-primary:hover { background: #2ea043; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: #21262d; color: #c9d1d9; border-color: #30363d; }
  .btn-secondary:hover { background: #30363d; }
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .toolbar-left { display: flex; align-items: center; gap: 12px; }
  .toolbar h2 { font-size: 13px; font-weight: 600; color: #f0f6fc; }
  .status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .status-idle { background: #30363d; color: #8b949e; }
  .status-loading { background: #1f2937; color: #58a6ff; }
  .status-success { background: #0d2818; color: #3fb950; }
  .status-error { background: #2d1115; color: #f85149; }
  .status-warn { background: #2b1d11; color: #ffa657; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-wrap { padding: 24px 24px 0; }
  .progress-bar-bg { background: #21262d; border-radius: 6px; height: 6px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { background: #238636; height: 6px; border-radius: 6px; transition: width 0.2s; }
  .progress-label { font-size: 12px; color: #8b949e; margin-top: 6px; }
  .table-wrap { flex: 1; overflow: auto; padding: 16px; }
  .placeholder { color: #484f58; font-size: 13px; display: flex; align-items: center; justify-content: center; height: 200px; text-align: center; line-height: 1.8; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #161b22; color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; text-align: left; border-bottom: 1px solid #30363d; position: sticky; top: 0; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: #c9d1d9; }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-style: normal; }
  thead th.sort-asc .sort-icon, thead th.sort-desc .sort-icon { opacity: 1; color: #58a6ff; }
  tbody tr { border-bottom: 1px solid #21262d; transition: background 0.1s; }
  tbody tr:hover { background: #161b22; }
  tbody td { padding: 8px 12px; vertical-align: middle; max-width: 300px; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .badge-enabled  { background: #0d2818; color: #3fb950; }
  .badge-disabled { background: #2d1115; color: #f85149; }
  .badge-type-1   { background: #1a2332; color: #79c0ff; }
  .badge-type-2   { background: #271a32; color: #d2a8ff; }
  .badge-type-3   { background: #2b1028; color: #f778ba; }
  .badge-type-4   { background: #0d2626; color: #2dd4bf; }
  .badge-type-5   { background: #272200; color: #e3c55a; }
  .badge-type-6   { background: #1a1a32; color: #818cf8; }
  .badge-type-7   { background: #0d2030; color: #67d4f8; }
  .badge-tz       { background: #2b1e0a; color: #e3a44a; }
  .badge-ok       { background: #0d2818; color: #3fb950; }
  .badge-err      { background: #2d1115; color: #f85149; }
  .monitor-name { color: #f0f6fc; font-weight: 500; }
  .monitor-id   { color: #8b949e; font-size: 11px; font-family: monospace; }
  .monitor-desc { color: #8b949e; font-size: 12px; }
  .post-btns { display: flex; gap: 6px; align-items: center; }
  .btn-copy-curl { background: #1a2332; color: #79c0ff; border: 1px solid #1f3548; font-size: 11px; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-copy-curl:hover { background: #1f3548; }
  .btn-copy-curl.copied { background: #0d2818; color: #3fb950; border-color: #1a4028; }
  .btn-copy-curl.error  { background: #2d1115; color: #f85149; border-color: #4a1a1a; }
  .btn-copy-ps { background: #271a32; color: #d2a8ff; border: 1px solid #3a2448; font-size: 11px; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-copy-ps:hover { background: #3a2448; }
  .btn-copy-ps.copied { background: #0d2818; color: #3fb950; border-color: #1a4028; }
  .btn-copy-ps.error  { background: #2d1115; color: #f85149; border-color: #4a1a1a; }
  .error-detail { color: #f85149; background: #2d1115; border: 1px solid #f8514930; border-radius: 6px; padding: 12px; font-size: 12px; margin: 16px; }
  .row-count { font-size: 11px; color: #8b949e; }
</style>
</head>
<body>

<div class="header">
  <h1>Observe All Monitors Export</h1>
  <span>v1 API</span>
</div>

<div class="form-bar">
  <div class="form-group">
    <label>Customer ID</label>
    <input type="text" id="customerId" placeholder="123456789">
  </div>
  <div class="form-group">
    <label>Domain (optional)</label>
    <input type="text" id="domain" placeholder="abc">
  </div>
  <div class="form-group">
    <label>Bearer Token</label>
    <input type="password" id="token" placeholder="paste token here">
  </div>
  <button class="btn btn-primary" id="exportBtn" onclick="startExport()">Export All Monitors</button>
</div>

<div class="content">
  <div class="toolbar">
    <div class="toolbar-left">
      <h2>All Monitors</h2>
      <span class="status status-idle" id="statusBadge">idle</span>
      <span class="row-count" id="rowCount"></span>
    </div>
    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadCSV()" style="display:none;">Download CSV Again</button>
  </div>
  <div id="progressWrap" style="display:none;" class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">Starting...</div>
  </div>
  <div class="table-wrap" id="tableWrap">
    <div class="placeholder">Enter credentials above and click Export All Monitors<br>to fetch, preview, and download all monitors as CSV.</div>
  </div>
</div>

<script>
let exportedRows = [];
let sortCol = null;
let sortDir = 1;
let sessionCustomerId = '';
let sessionHost = '';
let sessionToken = '';

const COLUMNS = [
  { key: 'name',           label: 'Name' },
  { key: 'id',             label: 'Monitor ID' },
  { key: 'description',    label: 'Description' },
  { key: 'ruleKind',       label: 'Monitor Type' },
  { key: 'disabled',       label: 'Status' },
  { key: 'monitorVersion', label: 'Last Modified' }
];

function sortBy(key) {
  sortDir = sortCol === key ? sortDir * -1 : 1;
  sortCol = key;
  renderTable(exportedRows);
}

function getSortValue(row, key) {
  const m = row.list;
  if (key === 'monitorVersion') return m.monitorVersion ? Number(BigInt(String(m.monitorVersion)) / 1000000n) : 0;
  if (key === 'disabled') return m.disabled ? 1 : 0;
  return String(m[key] || '').toLowerCase();
}

const TYPE_COLORS = ['badge-type-1','badge-type-2','badge-type-3','badge-type-4','badge-type-5','badge-type-6','badge-type-7'];
const typeColorMap = {};
let typeColorIndex = 0;

function getTypeBadgeClass(kind) {
  if (!kind) return 'badge-type-1';
  if (!typeColorMap[kind]) { typeColorMap[kind] = TYPE_COLORS[typeColorIndex++ % TYPE_COLORS.length]; }
  return typeColorMap[kind];
}

function setStatus(state, text) {
  const el = document.getElementById('statusBadge');
  el.className = 'status status-' + state;
  el.innerHTML = (state === 'loading' ? '<span class="spinner"></span>' : '') + text;
}

function setProgress(done, total) {
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Fetching monitor details: ' + done + ' / ' + total + ' (' + pct + '%)';
}

async function apiFetch(url, customerId, token) {
  const resp = await fetch(url, {
    method: 'GET',
    headers: { 'Authorization': 'Bearer ' + customerId + ' ' + token, 'Content-Type': 'application/json' }
  });
  const data = await resp.json();
  if (!resp.ok) throw { status: resp.status, body: data };
  return data;
}

async function startExport() {
  const customerId = document.getElementById('customerId').value.trim();
  const domain     = document.getElementById('domain').value.trim();
  const token      = document.getElementById('token').value.trim();

  if (!customerId || !token) { alert('Please fill in Customer ID and Token.'); return; }

  const exportBtn = document.getElementById('exportBtn');
  exportBtn.disabled = true;
  exportedRows = [];
  document.getElementById('downloadBtn').style.display = 'none';
  document.getElementById('rowCount').textContent = '';
  document.getElementById('tableWrap').innerHTML = '';
  document.getElementById('progressWrap').style.display = 'block';
  setProgress(0, 0);
  setStatus('loading', 'fetching list...');

  const host = domain ? customerId + '.' + domain + '.observeinc.com' : customerId + '.observeinc.com';
  sessionCustomerId = customerId;
  sessionHost = host;
  sessionToken = token;

  try {
    const list = await apiFetch('https://' + host + '/v1/monitors', customerId, token);
    const monitors = Array.isArray(list) ? list : [];

    if (monitors.length === 0) {
      setStatus('success', 'HTTP 200');
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('tableWrap').innerHTML = '<div class="placeholder">No monitors found.</div>';
      exportBtn.disabled = false;
      return;
    }

    setStatus('loading', 'fetching details...');
    setProgress(0, monitors.length);

    const errors = [];
    for (let i = 0; i < monitors.length; i++) {
      const m = monitors[i];
      document.getElementById('progressLabel').textContent =
        'Fetching "' + (m.name || m.id) + '" (' + (i + 1) + ' / ' + monitors.length + ')';

      let detail = null;
      try {
        detail = await apiFetch('https://' + host + '/v1/monitors/' + m.id, customerId, token);
      } catch (e) {
        errors.push({ id: m.id, name: m.name, err: e });
      }

      const postBody = detail ? transformForCreate(detail) : null;
      exportedRows.push({ list: m, postBody, error: !detail });
      setProgress(i + 1, monitors.length);
    }

    const errCount = errors.length;
    if (errCount > 0) {
      setStatus('warn', (monitors.length - errCount) + ' ok, ' + errCount + ' failed');
    } else {
      setStatus('success', 'HTTP 200');
    }

    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('rowCount').textContent = exportedRows.length + ' monitor' + (exportedRows.length !== 1 ? 's' : '');
    renderTable(exportedRows);
    downloadCSV();
    document.getElementById('downloadBtn').style.display = 'inline-block';

  } catch (err) {
    setStatus('error', 'failed');
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('tableWrap').innerHTML =
      '<div class="error-detail">Error: ' + escapeHtml(err.body ? JSON.stringify(err.body) : err.message || String(err)) +
      '<br><br>If this is a CORS error, you may need to run this page from the same origin or use a proxy.</div>';
  }

  exportBtn.disabled = false;
}

function renderTable(rows) {
  let sorted = rows.slice();
  if (sortCol) {
    sorted.sort(function(a, b) {
      const av = getSortValue(a, sortCol), bv = getSortValue(b, sortCol);
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  let html = '<table><thead><tr>';
  COLUMNS.forEach(function(col) {
    const active = sortCol === col.key;
    const cls = active ? (sortDir === 1 ? ' sort-asc' : ' sort-desc') : '';
    const icon = active ? (sortDir === 1 ? '▲' : '▼') : '⇅';
    html += '<th class="' + cls + '" onclick="sortBy(\'' + col.key + '\')">' +
      col.label + '<i class="sort-icon">' + icon + '</i></th>';
  });
  html += '<th>POST</th></tr></thead><tbody>';

  sorted.forEach(function(row, i) {
    const origIdx = exportedRows.indexOf(row);
    const m = row.list;
    const ts = nanoToFormatted(m.monitorVersion);
    const curlCell = row.error
      ? '<span class="badge badge-err">fetch failed</span>'
      : '<div class="post-btns"><button class="btn-copy-curl" onclick="copyCurl(' + origIdx + ', this)">Copy cURL</button><button class="btn-copy-ps" onclick="copyPS(' + origIdx + ', this)">Copy PowerShell</button></div>';

    html += '<tr>' +
      '<td><span class="monitor-name">' + escapeHtml(m.name || '') + '</span></td>' +
      '<td><span class="monitor-id">' + escapeHtml(m.id || '') + '</span></td>' +
      '<td><span class="monitor-desc">' + escapeHtml(m.description || '') + '</span></td>' +
      '<td><span class="badge ' + getTypeBadgeClass(m.ruleKind) + '">' + escapeHtml(m.ruleKind || '') + '</span></td>' +
      '<td><span class="badge ' + (m.disabled ? 'badge-disabled' : 'badge-enabled') + '">' + (m.disabled ? 'Disabled' : 'Enabled') + '</span></td>' +
      '<td><span class="monitor-desc">' + escapeHtml(ts.display) + ' <span class="badge badge-tz">' + escapeHtml(ts.tz) + '</span></span></td>' +
      '<td>' + curlCell + '</td>' +
      '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

function copyToClipboard(text, btn, successLabel, idleLabel) {
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = successLabel;
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = idleLabel; btn.classList.remove('copied'); }, 1500);
  }).catch(function() {
    btn.textContent = 'Failed';
    btn.classList.add('error');
    setTimeout(function() { btn.textContent = idleLabel; btn.classList.remove('error'); }, 1500);
  });
}

function copyCurl(idx, btn) {
  const row = exportedRows[idx];
  if (!row || !row.postBody) return;
  const jsonStr = JSON.stringify(row.postBody, null, 2);
  const cmd = "curl https://" + sessionHost + "/v1/monitors \\\n" +
    "  --request POST \\\n" +
    "  --header 'Content-Type: application/json' \\\n" +
    "  --header 'Authorization: Bearer " + sessionCustomerId + " " + sessionToken + "' \\\n" +
    "  --data '" + jsonStr.replace(/'/g, "'\\''") + "'";
  copyToClipboard(cmd, btn, 'Copied!', 'Copy cURL');
}

function copyPS(idx, btn) {
  const row = exportedRows[idx];
  if (!row || !row.postBody) return;
  const jsonStr = JSON.stringify(row.postBody, null, 2).replace(/`/g, '``').replace(/'/g, "''");
  const cmd = "Invoke-RestMethod `\n" +
    "  -Uri 'https://" + sessionHost + "/v1/monitors' `\n" +
    "  -Method Post `\n" +
    "  -Headers @{\n" +
    "    'Content-Type' = 'application/json'\n" +
    "    'Authorization' = 'Bearer " + sessionCustomerId + " " + sessionToken + "'\n" +
    "  } `\n" +
    "  -Body '" + jsonStr + "'";
  copyToClipboard(cmd, btn, 'Copied!', 'Copy PowerShell');
}

function downloadCSV() {
  if (!exportedRows.length) return;

  const headers = ['Name', 'Monitor ID', 'Description', 'Monitor Type', 'Status', 'Last Modified', 'POST Data (JSON)'];
  const rows = [headers.map(csvCell).join(',')];

  exportedRows.forEach(function(row) {
    const m = row.list;
    const ts = nanoToFormatted(m.monitorVersion);
    const postData = row.postBody ? JSON.stringify(row.postBody) : '';
    const vals = [
      m.name || '',
      m.id || '',
      m.description || '',
      m.ruleKind || '',
      m.disabled ? 'Disabled' : 'Enabled',
      ts.full,
      postData
    ];
    rows.push(vals.map(csvCell).join(','));
  });

  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'observe_all_monitors_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function csvCell(val) {
  return '"' + String(val === undefined || val === null ? '' : val).replace(/"/g, '""') + '"';
}

function transformForCreate(data) {
  const body = stripNulls(JSON.parse(JSON.stringify(data)));
  delete body.id;
  delete body.monitorVersion;
  body.name = (body.name || '') + ' (auto-generated)';
  if (body.definition) cleanDefinition(body.definition);
  if (body.actionRules && Array.isArray(body.actionRules)) {
    body.actionRules = body.actionRules.map(transformActionRule);
  }
  const ordered = {};
  ['name', 'description', 'ruleKind', 'disabled', 'definition', 'actionRules'].forEach(function(k) {
    if (body[k] !== undefined) ordered[k] = body[k];
  });
  Object.keys(body).forEach(function(k) { if (!(k in ordered)) ordered[k] = body[k]; });
  return ordered;
}

function cleanDefinition(def) {
  if (def.inputQuery) {
    delete def.inputQuery.layout;
    if (def.inputQuery.stages) {
      def.inputQuery.stages.forEach(function(stage) {
        delete stage.layout;
        if (Array.isArray(stage.input)) stage.input = stage.input[0];
        if (stage.input) { delete stage.input.datasetPath; delete stage.input.stageId; }
      });
    }
  }
}

function transformActionRule(rule) {
  const out = {};
  if (rule.definition) {
    out.definition = stripNulls(JSON.parse(JSON.stringify(rule.definition)));
    delete out.definition.actionId;
    if (!out.definition.name && out.definition.type) {
      if (out.definition.type === 'Email' && out.definition.email) {
        out.definition.name = 'Email ' + ((out.definition.email.addresses || [])[0] || 'action');
      } else {
        out.definition.name = out.definition.type + ' action';
      }
    }
  } else if (rule.actionId) {
    out.actionId = rule.actionId;
  }
  if (rule.levels != null)              out.levels = rule.levels;
  if (rule.conditions != null)          out.conditions = rule.conditions;
  if (rule.sendEndNotifications != null) out.sendEndNotifications = rule.sendEndNotifications;
  if (rule.sendRemindersInterval != null) out.sendRemindersInterval = rule.sendRemindersInterval;
  return out;
}

function stripNulls(obj) {
  if (Array.isArray(obj)) return obj.map(stripNulls);
  if (obj && typeof obj === 'object') {
    const out = {};
    for (const [k, v] of Object.entries(obj)) { if (v !== null) out[k] = stripNulls(v); }
    return out;
  }
  return obj;
}

function nanoToFormatted(ns) {
  if (!ns) return { display: '', tz: '', full: '' };
  const ms = Math.floor(Number(BigInt(String(ns)) / 1000000n));
  const d = new Date(ms);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const year = d.getFullYear();
  const month = months[d.getMonth()];
  const day = String(d.getDate()).padStart(2, '0');
  let h = d.getHours();
  const tt = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  const hh = String(h).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const ss = String(d.getSeconds()).padStart(2, '0');
  const tz = d.toLocaleTimeString('en', { timeZoneName: 'short' }).split(' ').pop();
  const display = year + '-' + month + '-' + day + ' ' + hh + ':' + mm + ':' + ss + ' ' + tt;
  return { display, tz, full: display + ' ' + tz };
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}
</script>

</body>
</html>
